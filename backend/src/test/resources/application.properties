spring.application.name=LuckyBoxTest
spring.datasource.url=jdbc:sqlite:./target/test-luckybox.sqlite?busy_timeout=5000
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.hikari.maximum-pool-size=1
spring.datasource.hikari.connection-init-sql=PRAGMA foreign_keys=ON
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.clean-disabled=false
luckybox.seed.enabled=true
luckybox.ratelimit.enabled=false
luckybox.security.csrf-enabled=false
luckybox.leaderboard.popular-cache-ttl-seconds=0
