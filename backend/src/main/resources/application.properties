luckybox.ratelimit.enabled=${LUCKYBOX_RATELIMIT_ENABLED:true}
luckybox.ratelimit.auth-limit=${LUCKYBOX_RATELIMIT_AUTH_LIMIT:20}
luckybox.ratelimit.auth-window-seconds=${LUCKYBOX_RATELIMIT_AUTH_WINDOW:60}
luckybox.ratelimit.draw-limit=${LUCKYBOX_RATELIMIT_DRAW_LIMIT:30}
luckybox.ratelimit.draw-window-seconds=${LUCKYBOX_RATELIMIT_DRAW_WINDOW:60}
luckybox.ratelimit.webhook-limit=${LUCKYBOX_RATELIMIT_WEBHOOK_LIMIT:60}
luckybox.ratelimit.webhook-window-seconds=${LUCKYBOX_RATELIMIT_WEBHOOK_WINDOW:60}
luckybox.ratelimit.trust-forwarded-headers=${LUCKYBOX_RATELIMIT_TRUST_FORWARDED_HEADERS:false}
