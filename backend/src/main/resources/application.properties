spring.application.name=LuckyBox
server.port=${SERVER_PORT:8080}

management.endpoints.web.exposure.include=${LUCKYBOX_ACTUATOR_EXPOSURE:health,info,metrics}
management.endpoint.health.probes.enabled=true

spring.datasource.url=${LUCKYBOX_DB_URL:jdbc:sqlite:./data/luckybox-dev.sqlite?busy_timeout=5000}
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.hikari.maximum-pool-size=${LUCKYBOX_DB_POOL_SIZE:1}
spring.datasource.hikari.connection-init-sql=PRAGMA foreign_keys=ON

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

luckybox.seed.enabled=${LUCKYBOX_SEED_ENABLED:true}

luckybox.promo.first-deposit-bonus=${LUCKYBOX_FIRST_DEPOSIT_BONUS:100}
luckybox.promo.spend-threshold=${LUCKYBOX_SPEND_THRESHOLD:1000}
luckybox.promo.spend-threshold-bonus=${LUCKYBOX_SPEND_THRESHOLD_BONUS:80}
luckybox.promo.daily-check-in-bonus=${LUCKYBOX_DAILY_CHECK_IN_BONUS:20}
luckybox.promo.daily-check-in-streak-bonuses=${LUCKYBOX_DAILY_CHECK_IN_STREAK_BONUSES:3:30,7:80,14:150,30:500}
luckybox.wish.auto-approve=${LUCKYBOX_WISH_AUTO_APPROVE:true}

luckybox.points.bonus-expiry-days=${LUCKYBOX_BONUS_POINT_EXPIRY_DAYS:365}

luckybox.vip.silver-threshold=${LUCKYBOX_VIP_SILVER:1000}
luckybox.vip.gold-threshold=${LUCKYBOX_VIP_GOLD:5000}
luckybox.vip.platinum-threshold=${LUCKYBOX_VIP_PLATINUM:20000}

luckybox.security.csrf-enabled=${LUCKYBOX_CSRF_ENABLED:true}

luckybox.upload.dir=${LUCKYBOX_UPLOAD_DIR:./uploads}
luckybox.upload.max-image-size-bytes=${LUCKYBOX_UPLOAD_MAX_IMAGE_SIZE_BYTES:2097152}

luckybox.payment.mock-webhook-secret=${LUCKYBOX_PAYMENT_MOCK_WEBHOOK_SECRET:dev-mock-webhook-secret}
luckybox.payment.mock-enabled=${LUCKYBOX_PAYMENT_MOCK_ENABLED:true}
luckybox.payment.provider=${LUCKYBOX_PAYMENT_PROVIDER:MOCK}
luckybox.payment.ecpay.enabled=${LUCKYBOX_PAYMENT_ECPAY_ENABLED:false}
luckybox.payment.ecpay.merchant-id=${LUCKYBOX_PAYMENT_ECPAY_MERCHANT_ID:}
luckybox.payment.ecpay.hash-key=${LUCKYBOX_PAYMENT_ECPAY_HASH_KEY:}
luckybox.payment.ecpay.hash-iv=${LUCKYBOX_PAYMENT_ECPAY_HASH_IV:}
luckybox.payment.ecpay.action-url=${LUCKYBOX_PAYMENT_ECPAY_ACTION_URL:https://payment-stage.ecpay.com.tw/Cashier/AioCheckOut/V5}
luckybox.payment.ecpay.return-url=${LUCKYBOX_PAYMENT_ECPAY_RETURN_URL:}
luckybox.payment.ecpay.client-back-url=${LUCKYBOX_PAYMENT_ECPAY_CLIENT_BACK_URL:}
luckybox.payment.ecpay.choose-payment=${LUCKYBOX_PAYMENT_ECPAY_CHOOSE_PAYMENT:Credit}
luckybox.payment.ecpay.credit-installment=${LUCKYBOX_PAYMENT_ECPAY_CREDIT_INSTALLMENT:}
luckybox.payment.ecpay.accept-simulated=${LUCKYBOX_PAYMENT_ECPAY_ACCEPT_SIMULATED:false}
luckybox.payment.linepay.enabled=${LUCKYBOX_PAYMENT_LINEPAY_ENABLED:false}
luckybox.payment.linepay.channel-id=${LUCKYBOX_PAYMENT_LINEPAY_CHANNEL_ID:}
luckybox.payment.linepay.channel-secret=${LUCKYBOX_PAYMENT_LINEPAY_CHANNEL_SECRET:}
luckybox.payment.linepay.api-base-url=${LUCKYBOX_PAYMENT_LINEPAY_API_BASE_URL:https://sandbox-api-pay.line.me}
luckybox.payment.linepay.currency=${LUCKYBOX_PAYMENT_LINEPAY_CURRENCY:TWD}
luckybox.payment.linepay.merchant-device-profile-id=${LUCKYBOX_PAYMENT_LINEPAY_MERCHANT_DEVICE_PROFILE_ID:}
luckybox.payment.jkopay.enabled=${LUCKYBOX_PAYMENT_JKOPAY_ENABLED:false}
luckybox.payment.jkopay.api-key=${LUCKYBOX_PAYMENT_JKOPAY_API_KEY:}
luckybox.payment.jkopay.secret-key=${LUCKYBOX_PAYMENT_JKOPAY_SECRET_KEY:}
luckybox.payment.jkopay.store-id=${LUCKYBOX_PAYMENT_JKOPAY_STORE_ID:}
luckybox.payment.jkopay.entry-url=${LUCKYBOX_PAYMENT_JKOPAY_ENTRY_URL:https://test-onlinepay.jkopay.app/platform/entry}
luckybox.payment.jkopay.currency=${LUCKYBOX_PAYMENT_JKOPAY_CURRENCY:TWD}
luckybox.payment.jkopay.confirm-url=${LUCKYBOX_PAYMENT_JKOPAY_CONFIRM_URL:}
luckybox.payment.jkopay.result-url=${LUCKYBOX_PAYMENT_JKOPAY_RESULT_URL:}
luckybox.payment.jkopay.result-display-url=${LUCKYBOX_PAYMENT_JKOPAY_RESULT_DISPLAY_URL:}

luckybox.app.base-url=${LUCKYBOX_APP_BASE_URL:http://localhost:5173}
luckybox.leaderboard.popular-cache-ttl-seconds=${LUCKYBOX_LEADERBOARD_POPULAR_CACHE_TTL_SECONDS:15}
luckybox.mail.enabled=${LUCKYBOX_MAIL_ENABLED:false}
luckybox.mail.from=${LUCKYBOX_MAIL_FROM:no-reply@luckybox.local}
